<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMB 2026 - SMPN 2 JABUNG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-blue-50 p-4 min-h-screen flex flex-col justify-between">
    <div class="max-w-md mx-auto mt-10 w-full">
        <h1 class="text-center font-bold text-xl uppercase">UPTD SMP NEGERI 2 JABUNG</h1>
        <p class="text-center mb-6 text-gray-600">Pengumuman Hasil Seleksi SPMB 2026</p>
        
        <div id="login-form" class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100">
            <input type="text" id="username" placeholder="Username (NIK)" class="w-full p-3 mb-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
            <input type="password" id="password" placeholder="Password (NIK)" class="w-full p-3 mb-4 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
            <button onclick="login()" id="btn" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition duration-200">Login dan Lihat Hasil</button>
        </div>

        <div id="result" class="hidden bg-white p-6 rounded-2xl shadow-lg text-center border border-green-100">
            <h2 class="text-2xl font-bold text-green-600">DITERIMA</h2>
            <div class="text-left mt-4 bg-gray-50 p-4 rounded-xl">
                <p class="text-gray-700">Nama: <b id="res-nama" class="text-black"></b></p>
                <p class="text-gray-700">NIK: <b id="res-nik" class="text-black"></b></p>
                <p class="text-gray-700">Jalur: <b id="res-jalur" class="text-black"></b></p>
            </div>
            <button onclick="location.reload()" class="mt-6 underline text-gray-500 hover:text-gray-800">Cek data lain</button>
        </div>
    </div>

    <footer class="text-center p-4 text-gray-400 text-sm">
        &copy; 2026 UPTD SMP NEGERI 2 JABUNG. All rights reserved.
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLc1HwsfIhsyxvmEn-SD1HYUXHiBsUqhPdWcL0IpGETQx785H5hscuimN529ayocY_/exec";

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btn');
            
            if(!u || !p) { alert("NIK tidak boleh kosong"); return; }
            
            btn.innerText = "Memproses...";
            
            try {
                const response = await fetch(`${SCRIPT_URL}?username=${u}&password=${p}`);
                const data = await response.json();
                
                if (data.status === "success") {
                    document.getElementById('login-form').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('res-nama').innerText = data.nama;
                    document.getElementById('res-nik').innerText = data.nik;
                    document.getElementById('res-jalur').innerText = data.jalur;
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else {
                    alert("NIK atau Password salah!");
                    btn.innerText = "Login dan Lihat Hasil";
                }
            } catch(e) {
                console.error(e);
                alert("Gagal terhubung ke server.");
                btn.innerText = "Login dan Lihat Hasil";
            }
        }
    </script>
</body>
</html>
